<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Badger Bookmarks — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <h1>Badger Bookmarks Settings</h1>
      <p class="subtitle">
        Connect to your Sanity project to start saving bookmarks.
      </p>

      <form id="settings-form">
        <label for="projectId">Project ID</label>
        <input
          type="text"
          id="projectId"
          placeholder="e.g. a1b2c3d4"
          required
          autocomplete="off"
          spellcheck="false"
        />

        <label for="dataset">Dataset</label>
        <input
          type="text"
          id="dataset"
          placeholder="production"
          value="production"
          required
          autocomplete="off"
          spellcheck="false"
        />

        <label for="token">API Token</label>
        <div class="token-field">
          <input
            type="password"
            id="token"
            placeholder="skRW..."
            required
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="toggle-token" class="btn-icon" title="Show/hide token">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="hint">
          Needs <strong>Editor</strong> or above permissions.
          Create one at
          <a href="https://www.sanity.io/manage" target="_blank" rel="noopener">
            sanity.io/manage</a>
          → API → Tokens.
        </p>

        <div class="actions">
          <button type="button" id="test-btn" class="btn btn-secondary">
            Test Connection
          </button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>

      <div id="status" class="status hidden"></div>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
